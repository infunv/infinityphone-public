# =================================================================================
# QUICK START & PLAYERS TUTORIAL
#
# STEP 1: How to get your Smartphone
#   - Admins can give a smartphone using: /phone give [player]
#   - Or get one for themselves using: /phone give
#   - To remove a phone from yourself or a player, use: /phone remove [player]
#
# STEP 2: Opening the Interface
#   - Hold the Smartphone in your main hand and click Right-Click (RMB) or Left-Click (LMB).
#   - This opens the main smartphone GUI menu.
#
# STEP 3: Checking your Phone Number
#   - In the main menu, hover over the Player Head in the center.
#   - It shows your unique, automatically generated phone number.
#   - You can click on the head to copy your number to the clipboard!
#
# STEP 4: Managing your Address Book (Phone Book)
#   - Click on the Bookshelf icon ("Phone Book") to view your contacts list.
#   - To add a contact, type in chat: /contact <number>
#   - You will see the contact added to your books!
#   - To block a player (blacklist them), use: /block <number|nickname>
#   - To unblock them, use: /unblock <number|nickname>
#
# STEP 5: Placing Calls
#   - Open a contact's profile in the Phone Book and click the Emerald Block ("Start Call").
#   - Or execute: /call <number|nickname>
#   - The recipient will receive an incoming call alert.
#   - To answer, the recipient must type: /accept
#   - To decline, the recipient must type: /cancel
#   - To end an active call, either player can type: /quit (or click Redstone in GUI).
#
# STEP 6: Sending Messages (SMS)
#   - Type: /msg <number|nickname> <text message>
#   - The recipient will instantly receive your SMS with a custom format.
#
# =================================================================================
# Placeholders
#
# {prefix} - Plugin prefix
# {playernick} - Player name/nickname
# {playernumber} - Player's phone number
# {contactnumber} - Target contact's phone number
# {contactname} - Target contact's name
# {number} - General placeholder for number/name
# {message} - SMS message text
# {money} - Cost formatted as currency
#
# =================================================================================

