#
# По вопросам коммерческого лицензирования обращайтесь: contact@infunv.ru
#
# =================================================================================
# БЫСТРЫЙ СТАРТ И РУКОВОДСТВО ДЛЯ ИГРОКОВ
#
# ШАГ 1: Как получить смартфон
#   - Администраторы могут выдать смартфон командой: /phone give [player]
#   - Или получить его себе командой: /phone give
#   - Чтобы удалить телефон у себя или у игрока, используйте: /phone remove [player]
#
# ШАГ 2: Открытие интерфейса
#   - Возьмите смартфон в основную руку и нажмите правой кнопкой мыши (RMB) или левой кнопкой мыши (LMB).
#   - Откроется главное GUI-меню смартфона.
#
# ШАГ 3: Проверка номера телефона
#   - В главном меню наведите курсор на голову игрока в центре.
#   - Там отображается ваш уникальный, автоматически сгенерированный номер телефона.
#   - Вы можете нажать на голову, чтобы скопировать номер в буфер обмена!
#
# ШАГ 4: Управление адресной книгой (Телефонной книгой)
#   - Нажмите на иконку книжной полки ("Телефонная книга"), чтобы открыть список контактов.
#   - Чтобы добавить контакт, введите в чат: /contact <number>
#   - Контакт будет добавлен в вашу книгу!
#   - Чтобы заблокировать игрока (добавить в чёрный список), используйте: /block <number|nickname>
#   - Чтобы разблокировать его, используйте: /unblock <number|nickname>
#
# ШАГ 5: Совершение звонков
#   - Откройте профиль контакта в Телефонной книге и нажмите на блок из изумруда ("Начать звонок").
#   - Или выполните: /call <number|nickname>
#   - Получатель получит уведомление о входящем звонке.
#   - Чтобы ответить, получатель должен ввести: /accept
#   - Чтобы отклонить, получатель должен ввести: /cancel
#   - Чтобы завершить активный звонок, любой игрок может ввести: /quit (или нажать на редстоун в GUI).
#
# ШАГ 6: Отправка сообщений (SMS)
#   - Введите: /msg <number|nickname> <text message>
#   - Получатель мгновенно получит ваше SMS в пользовательском формате.
#
# =================================================================================
# Плейсхолдеры
#
# {prefix} - Префикс плагина
# {playernick} - Имя/ник игрока
# {playernumber} - Номер телефона игрока
# {contactnumber} - Номер телефона целевого контакта
# {contactname} - Имя целевого контакта
# {number} - Общий плейсхолдер для номера/имени
# {message} - Текст SMS-сообщения
# {money} - Стоимость в формате валюты
#
# =================================================================================

